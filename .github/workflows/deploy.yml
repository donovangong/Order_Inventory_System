name: CA2 Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker build -t ca2-frontend:latest ./frontend
          docker build -t ca2-product-service:latest ./product-service
          docker build -t ca2-order-service:latest ./order-service

      - name: Import images into k3s
        run: |
          docker save ca2-frontend:latest | sudo /usr/local/bin/k3s ctr images import -
          docker save ca2-product-service:latest | sudo /usr/local/bin/k3s ctr images import -
          docker save ca2-order-service:latest | sudo /usr/local/bin/k3s ctr images import -

      - name: Deploy with Helm
        run: |
          sudo cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          sudo chown $USER:$USER $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install ca2 ./helm/ca2 -n ca2 --create-namespace
