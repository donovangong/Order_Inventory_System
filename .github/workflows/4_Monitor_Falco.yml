name: 4_Monitor_Falco

on:
  workflow_dispatch:
  workflow_call:

jobs:
  monitor_falco:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare kubeconfig
        run: |
          cp /etc/rancher/k3s/k3s.yaml $RUNNER_TEMP/k3s.yaml
          chmod 600 $RUNNER_TEMP/k3s.yaml

      - name: Install Falco runtime security monitoring
        run: |
          retry() {
            local attempt=1
            local max_attempts=3
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 20
            done
          }

          retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo add falcosecurity https://falcosecurity.github.io/charts --force-update
          retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm repo update
          retry env KUBECONFIG=$RUNNER_TEMP/k3s.yaml helm upgrade --install falco falcosecurity/falco -n falco --create-namespace -f resources/falco/falco-values.yaml

      - name: Wait for Falco rollout
        run: |
          KUBECONFIG=$RUNNER_TEMP/k3s.yaml kubectl -n falco rollout status daemonset/falco --timeout=180s
