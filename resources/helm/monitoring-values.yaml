grafana:
  adminUser: admin
  adminPassword: admin
  defaultDashboardsEnabled: true
  sidecar:
    datasources:
      defaultDatasourceEnabled: false
  additionalDataSources:
    - name: Prometheus
      uid: Prometheus
      type: prometheus
      access: proxy
      url: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
      isDefault: true
    - name: Loki
      uid: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: ca2
          orgId: 1
          folder: CA2
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/ca2
  dashboardsConfigMaps:
    ca2: ca2-grafana-dashboard
  grafana.ini:
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/ca2/ca2-dashboard.json
